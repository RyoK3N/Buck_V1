name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run tests
        run: |
          set -e
          if command -v pytest >/dev/null 2>&1 && [ -d . ]; then
            if [ -f pytest.ini ] || [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -d tests ]; then
              pytest -q || true
            fi
          fi
          if [ -f package.json ]; then npm test --if-present || true; fi

      - name: Build Python package
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install --upgrade build
            python -m build -n
          fi

      - name: Create source archive
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p dist-release
          git archive -o dist-release/${TAG}.zip HEAD

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist-release/${{ github.ref_name }}.zip
          asset_name: ${{ github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Publish to PyPI (optional)
        if: secrets.PYPI_API_TOKEN != ''
        run: |
          python -m pip install --upgrade twine
          python -m twine upload -u __token__ -p ${PYPI_API_TOKEN} dist/*
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
