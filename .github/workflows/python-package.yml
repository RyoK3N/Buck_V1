name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    env:
      OPENAI_API_KEY: test-key-for-ci

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest-cov pip-audit
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short -m "not network" --cov=agent_scripts --cov-report=term-missing
    - name: Audit Python dependencies for known CVEs
      # Informational for now (continue-on-error) — flips to a hard gate once
      # the existing dependency tree's known advisories are triaged.
      continue-on-error: true
      run: pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI/frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: UI/frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Type-check
      run: npx tsc --noEmit
    - name: Build
      run: npm run build
    - name: Audit npm dependencies for known CVEs
      continue-on-error: true
      run: npm audit --audit-level=high
